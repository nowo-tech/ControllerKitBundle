name: controller-kit-bundle-demo-symfony-8
services:
  php:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: controller-kit-demo-symfony8-php
    working_dir: /app
    ports:
      - "${PORT:-8011}:80"
    volumes:
      - .:/app
      - ../..:/var/controller-kit-bundle
      - ./docker/frankenphp/Caddyfile.dev:/etc/frankenphp/Caddyfile.dev
      - ./docker/php-dev.ini:/usr/local/etc/php/conf.d/99-dev.ini:ro
      - composer-cache:/root/.composer/cache
    environment:
      - COMPOSER_ALLOW_SUPERUSER=1
      - APP_ENV=dev
      - APP_DEBUG=1
      - APP_SECRET=${APP_SECRET:-demo-secret}
    networks:
      - controller-kit-demo-network

volumes:
  composer-cache:
    driver: local

networks:
  controller-kit-demo-network:
    driver: bridge
